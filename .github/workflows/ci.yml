name: Run Tests

on:
  push:

jobs:
  test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: qure

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: qure/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: npm test -- --coverage --watchAll=false
        env:
          CI: true

      - name: Add coverage summary to GitHub Actions
        run: |
          echo "## Coverage Summary" >> $GITHUB_STEP_SUMMARY
          if [ -f coverage/coverage-summary.json ]; then
            node -e "const fs=require('fs'); const s=JSON.parse(fs.readFileSync('coverage/coverage-summary.json','utf8')).total; console.log('| Metric | Percent | Covered/Total |'); console.log('|---|---:|---:|'); for (const k of ['lines','statements','functions','branches']) { const v=s[k]; console.log(\`| ${k} | ${v.pct}% | ${v.covered}/${v.total} |\`); }" >> $GITHUB_STEP_SUMMARY
          else
            echo 'coverage-summary.json not found.' >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: BigOh-no/Qure
          files: ./qure/coverage/lcov.info
          fail_ci_if_error: true